<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLDSB — ISBN / ISMN / ISSN Issuance & Management Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='18' fill='%231d2a52'/%3E%3Cg transform='translate(6,14)' fill='none' stroke='%23ffffff' stroke-width='4'%3E%3Cpath d='M42 12 C30 5 14 5 4 10 L4 60 C14 55 30 55 42 62 Z'/%3E%3Cpath d='M42 12 C54 5 70 5 80 10 L80 60 C70 55 54 55 42 62 Z'/%3E%3Cline x1='42' y1='12' x2='42' y2='62' stroke-width='2.5'/%3E%3Cline x1='12' y1='22' x2='34' y2='20' stroke-width='2.5'/%3E%3Cline x1='12' y1='32' x2='34' y2='30' stroke-width='2.5'/%3E%3Cline x1='12' y1='42' x2='34' y2='40' stroke-width='2.5'/%3E%3Cline x1='50' y1='20' x2='72' y2='22' stroke-width='2.5'/%3E%3Cline x1='50' y1='30' x2='72' y2='32' stroke-width='2.5'/%3E%3Cline x1='50' y1='40' x2='72' y2='42' stroke-width='2.5'/%3E%3C/g%3E%3C/svg%3E">
<style>
:root{
  --navy:#1d2a52;
  --green:#2D5F3E;
  --green-dark:#214a30;
  --sage:#8A9B8E;
  --cream:#EDEEE7;
  --white:#FFFFFF;
  --ink:#1A1A1A;
  --teal:#1f8a8c;
  --brick:#8c3b2e;
  --amber:#a97a1f;
  --line:#dde0d9;
  --line-soft:#eceee8;
  --radius:8px;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --shadow:0 1px 3px rgba(20,30,20,.06),0 8px 24px rgba(20,30,20,.04);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:14px;}
a{color:var(--green);text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none !important;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#cfd4cb;border-radius:6px;}

#app{min-height:100vh;display:flex;flex-direction:column;}

/* ---------------- TOP BAR ---------------- */
.topbar{background:var(--white);border-bottom:1px solid var(--line);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.brand{display:flex;align-items:center;gap:16px;cursor:pointer;}
.brand-mark{width:160px;height:54px;flex:none;}
.brand-divider{width:1px;height:46px;background:var(--line);flex:none;}
.brand-title{display:flex;flex-direction:column;line-height:1.25;}
.brand-title .t1{font-family:var(--serif);font-size:18px;color:var(--green-dark);font-weight:700;}
.brand-title .t2{font-size:11px;color:#6a7a6e;letter-spacing:1px;font-weight:700;margin-top:2px;text-transform:uppercase;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.lang-switch{display:flex;border:1px solid var(--line);border-radius:20px;overflow:hidden;}
.lang-switch button{border:none;background:#fff;padding:6px 11px;font-size:12px;color:#777;font-weight:600;border-right:1px solid var(--line);}
.lang-switch button:last-child{border-right:none;}
.lang-switch button.on{background:var(--green-dark);color:#fff;}
.role-chip{background:var(--cream);border:1px solid var(--line);border-radius:20px;padding:6px 14px;color:var(--green-dark);font-weight:600;font-size:12.5px;}

.btn{border:1px solid var(--green);background:var(--green);color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:13.5px;font-weight:600;letter-spacing:.2px;transition:.15s;white-space:nowrap;}
.btn:hover{background:var(--green-dark);}
.btn.outline{background:transparent;color:var(--green);border:1px solid var(--green);}
.btn.outline:hover{background:var(--green);color:#fff;}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
.btn.ghost:hover{border-color:var(--sage);background:#fafbf9;}
.btn.small{padding:6px 12px;font-size:12.5px;}
.btn.tiny{padding:4px 10px;font-size:11.5px;}
.btn.danger{background:var(--brick);border-color:var(--brick);}
.btn.danger:hover{background:#702c22;}
.btn.amber{background:var(--amber);border-color:var(--amber);}
.btn:disabled{opacity:.45;cursor:not-allowed;}

main{flex:1;width:100%;}
.footer{background:var(--green-dark);color:#dce8df;padding:30px 26px;font-size:12.5px;width:100%;clear:both;flex-basis:100%;}
.footer-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;}
.footer h5{color:#fff;font-size:13px;margin:0 0 10px;}
.footer a{color:#bcd4c2;display:block;margin-bottom:5px;}
.footer .col{max-width:280px;}

/* ---------------- PUBLIC HOME ---------------- */
.hero{background:linear-gradient(165deg,#9aa99d 0%,var(--cream) 70%);padding:56px 26px 64px;}
.hero-inner{max-width:1080px;margin:0 auto;text-align:center;}
.eyebrow{font-size:26px;letter-spacing:2px;text-transform:uppercase;color:var(--green-dark);font-weight:700;margin-bottom:12px;}
.hero h1{font-family:var(--serif);font-size:38px;margin:0 0 14px;color:var(--green-dark);font-weight:700;line-height:1.1;}
.hero p.sub{max-width:640px;margin:0 auto 30px;color:#33402f;font-size:16px;line-height:1.6;}
.search-card{background:#fff;border-radius:12px;padding:18px;max-width:840px;margin:0 auto;box-shadow:0 14px 36px rgba(45,95,62,.14);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-card select{padding:11px;border:1px solid var(--line);border-radius:var(--radius);font-size:13.5px;background:#fff;min-width:150px;}
.search-card input{flex:1;min-width:200px;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);font-size:13.5px;}
.search-results{max-width:840px;margin:14px auto 0;text-align:left;background:#fff;border-radius:10px;border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow);}
.search-results .rh{padding:9px 16px;background:var(--cream);font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#667;}
.search-results .row{padding:12px 16px;border-top:1px solid var(--line-soft);font-size:13.5px;display:flex;justify-content:space-between;gap:10px;align-items:center;}
.search-results .row b{color:var(--green-dark);}
.search-results .tag{font-size:11px;background:var(--cream);color:var(--green-dark);padding:3px 9px;border-radius:10px;font-weight:700;}
.quicklinks{max-width:1080px;margin:32px auto 0;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

.section{padding:52px 26px;}
.section.alt{background:#fff;}
.section-inner{max-width:1180px;margin:0 auto;}
.section h2{font-family:var(--serif);font-size:26px;color:var(--green-dark);margin:0 0 6px;}
.section .section-lead{color:#667;font-size:14px;margin:0 0 24px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media (max-width:880px){.grid3{grid-template-columns:1fr;}}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;}
.info-card h3{margin:0 0 4px;font-size:16px;color:var(--green-dark);font-family:var(--serif);}
.info-card .digits{font-size:11.5px;color:var(--teal);font-weight:700;margin-bottom:10px;}
.info-card p{margin:0 0 14px;font-size:13.5px;color:#4a4a4a;line-height:1.55;}
.info-card .small-link{font-size:12.5px;font-weight:700;color:var(--green);cursor:pointer;}

/* advertisements */
.ads-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
@media (max-width:880px){.ads-grid{grid-template-columns:1fr;}}
.ad-card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column;box-shadow:var(--shadow);}
.ad-card:hover{box-shadow:0 18px 38px rgba(45,95,62,.18);transform:translateY(-4px);}
.ad-cover{height:160px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ad-cover .ad-ribbon{position:absolute;top:14px;left:0;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:1px;padding:5px 14px 5px 16px;border-radius:0 4px 4px 0;box-shadow:0 2px 6px rgba(0,0,0,.2);z-index:2;}
.ad-cover.event{background:linear-gradient(140deg,#2D5F3E,#143a25);} .ad-cover.event .ad-ribbon{background:var(--amber);}
.ad-cover.notice{background:linear-gradient(140deg,#1f5a6b,#0e3540);} .ad-cover.notice .ad-ribbon{background:#2D5F3E;}
.ad-cover.training{background:linear-gradient(140deg,#6d4b1f,#3d2a10);} .ad-cover.training .ad-ribbon{background:var(--teal);}
.ad-emblem{position:relative;z-index:1;text-align:center;color:rgba(255,255,255,.96);padding:0 18px;}
.ad-emblem .big{font-family:var(--serif);font-size:30px;font-weight:700;line-height:1;}
.ad-emblem .small{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;opacity:.85;}
.ad-cover::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 72% 16%,rgba(255,255,255,.16),transparent 60%);}
.ad-body{padding:18px;flex:1;display:flex;flex-direction:column;}
.ad-body .ad-meta{font-size:11px;color:var(--teal);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.ad-body h4{font-size:16.5px;margin:0 0 8px;color:var(--green-dark);font-family:var(--serif);font-weight:700;line-height:1.25;}
.ad-body p{font-size:13px;color:#555;margin:0 0 14px;line-height:1.55;flex:1;}
.ad-body .ad-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line-soft);padding-top:12px;}
.ad-body .ad-foot .link{font-size:12.5px;color:var(--green-dark);font-weight:800;}
.ad-body .ad-foot .link::after{content:" →";}
.ad-body .ad-foot .ad-date{font-size:11.5px;color:#999;}

/* help / instructions */
.help-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
@media (max-width:880px){.help-grid{grid-template-columns:1fr;}}
.steps-flow{display:flex;flex-direction:column;gap:0;}
.step-line{display:flex;gap:14px;}
.step-line .num{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;font-size:14px;z-index:2;}
.step-line .bar{width:2px;background:var(--line);margin:0 16px;flex:none;}
.step-line:last-child .bar{background:transparent;}
.step-line .body{padding-bottom:22px;}
.step-line .body h4{margin:4px 0 4px;font-size:14.5px;color:var(--green-dark);}
.step-line .body p{margin:0;font-size:13px;color:#566;line-height:1.5;}
.contact-card{background:var(--green-dark);color:#dce8df;border-radius:12px;padding:24px;font-size:13px;line-height:1.85;}
.contact-card h4{color:#fff;margin:0 0 12px;font-family:var(--serif);font-size:17px;}
.contact-card .crow{display:flex;gap:10px;margin-bottom:8px;}
.contact-card .crow .ci{width:18px;flex:none;opacity:.7;}
.faq-item{border-top:1px solid var(--line);padding:14px 0;}
.faq-item:first-child{border-top:none;}
.faq-q{font-weight:700;font-size:13.5px;color:var(--green-dark);cursor:pointer;display:flex;justify-content:space-between;}
.faq-a{font-size:13px;color:#566;line-height:1.55;margin-top:8px;}

/* directory */
.directory-table-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}

/* ---------------- SIGN-IN / ROLE SELECT ---------------- */
.signin-wrap{max-width:1000px;margin:0 auto;padding:48px 26px 70px;}
.signin-head{text-align:center;margin-bottom:34px;}
.signin-head h1{font-family:var(--serif);font-size:30px;color:var(--green-dark);margin:6px 0 8px;}
.signin-head p{color:#566;font-size:14px;max-width:640px;margin:0 auto;}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
@media (max-width:880px){.role-grid{grid-template-columns:1fr 1fr;}}
@media (max-width:560px){.role-grid{grid-template-columns:1fr;}}
.role-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px 20px;text-align:left;display:flex;flex-direction:column;gap:10px;transition:.15s;cursor:pointer;box-shadow:var(--shadow);}
.role-card:hover{border-color:var(--green);box-shadow:0 10px 26px rgba(45,95,62,.16);transform:translateY(-3px);}
.role-card .icon{width:46px;height:46px;border-radius:10px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:21px;}
.role-card h3{margin:0;font-size:15.5px;color:var(--green-dark);}
.role-card p{margin:0;font-size:12.5px;color:#5a5a5a;line-height:1.5;flex:1;}
.role-card .enter{font-size:12px;font-weight:700;color:var(--teal);}
.role-card .creds{font-size:11px;color:#999;background:var(--cream);padding:6px 9px;border-radius:6px;}

.auth-split{display:grid;grid-template-columns:1fr 1fr;gap:0;max-width:920px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
@media (max-width:780px){.auth-split{grid-template-columns:1fr;}}
.auth-side{background:linear-gradient(160deg,var(--green) 0%,var(--green-dark) 100%);color:#fff;padding:38px 30px;display:flex;flex-direction:column;justify-content:center;}
.auth-side h2{font-family:var(--serif);font-size:24px;margin:0 0 12px;}
.auth-side ul{margin:14px 0 0;padding-left:18px;font-size:13px;line-height:1.9;color:#d6e6db;}
.auth-main{padding:34px 30px;}
.auth-tabs{display:flex;gap:8px;margin-bottom:22px;}
.auth-tabs button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--line);background:#fff;font-weight:700;font-size:13px;color:#778;}
.auth-tabs button.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.account-list{display:flex;flex-direction:column;gap:10px;}
.account-row{background:#fff;border:1px solid var(--line);border-radius:9px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.12s;}
.account-row:hover{border-color:var(--green);background:#fafbf9;}
.account-row .nm{font-weight:700;font-size:13.5px;color:var(--green-dark);}
.account-row .tp{font-size:11.5px;color:#889;}

/* ---------------- APP SHELL ---------------- */
.app-shell{display:flex;min-height:calc(100vh - 79px);}
.sidebar{width:248px;flex:none;background:var(--white);border-right:1px solid var(--line);padding:16px 0;display:flex;flex-direction:column;}
.sidebar .who{padding:6px 18px 16px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.sidebar .who .avatar{width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;margin-bottom:8px;}
.sidebar .who .role-name{font-weight:700;color:var(--green-dark);font-size:13.5px;line-height:1.3;}
.sidebar .who .role-sub{font-size:11.5px;color:var(--sage);margin-top:2px;}
.nav-group{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#9aa;padding:12px 18px 5px;font-weight:700;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;font-size:13.5px;color:#3a463c;cursor:pointer;border-left:3px solid transparent;}
.nav-item:hover{background:var(--cream);}
.nav-item.active{background:var(--cream);border-left-color:var(--green);color:var(--green-dark);font-weight:700;}
.nav-item .ico{width:17px;text-align:center;opacity:.75;flex:none;}
.nav-item .badge-count{margin-left:auto;background:var(--brick);color:#fff;font-size:10px;border-radius:10px;padding:1px 7px;font-weight:700;}
.content{flex:1;padding:28px 34px;max-width:1280px;overflow-x:hidden;}
.page-head{margin-bottom:24px;}
.content h1.page-title{font-family:var(--serif);font-size:25px;color:var(--green-dark);margin:0 0 4px;}
.content .page-sub{font-size:13.5px;color:#667;margin:0;}
.breadcrumb{font-size:12px;color:#99a;margin-bottom:8px;}

.panel{background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:22px;box-shadow:var(--shadow);}
.panel .panel-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.panel .panel-head h3{margin:0;font-size:14.5px;color:var(--green-dark);}
.panel .panel-head .ph-sub{font-size:11.5px;color:#99a;font-weight:400;}
.panel .panel-body{padding:18px;}
.panel .panel-body.flush{padding:0;}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
@media (max-width:1000px){.stat-row{grid-template-columns:1fr 1fr;}}
.stat-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:17px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat-card .ico{position:absolute;right:-6px;top:-6px;font-size:46px;opacity:.06;}
.stat-card .num{font-family:var(--serif);font-size:27px;color:var(--green-dark);font-weight:700;}
.stat-card .lbl{font-size:11.5px;color:#778;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.stat-card .delta{font-size:11px;margin-top:6px;font-weight:700;}
.stat-card .delta.up{color:var(--green);} .stat-card .delta.down{color:var(--brick);}
.stat-card.accent{background:linear-gradient(150deg,var(--green) 0%,var(--green-dark) 100%);}
.stat-card.accent .num,.stat-card.accent .lbl{color:#fff;}
.stat-card.accent .lbl{opacity:.85;}

.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#778;padding:10px 12px;border-bottom:2px solid var(--line);background:#fbfcfa;white-space:nowrap;}
table td{padding:11px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
table tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#fafbf8;}
.t-right{text-align:right;}
.mono{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;}

.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px;white-space:nowrap;}
.badge.draft{background:#eee;color:#555;}
.badge.submitted{background:#e4ecf0;color:#2c5870;}
.badge.under_review{background:#fff2dc;color:var(--amber);}
.badge.correction{background:#f3e0dc;color:var(--brick);}
.badge.forwarded{background:#e7eee0;color:var(--green-dark);}
.badge.approved{background:#dcefe2;color:var(--green-dark);}
.badge.rejected{background:#f3e0dc;color:var(--brick);}
.badge.payment_pending{background:#fff2dc;color:var(--amber);}
.badge.payment_verified{background:#dcefe2;color:var(--green-dark);}
.badge.issued{background:var(--green-dark);color:#fff;}
.badge.pending_review{background:#fff2dc;color:var(--amber);}
.badge.active_acc{background:#dcefe2;color:var(--green-dark);}
.badge.neutral{background:var(--cream);color:#667;}
.badge.verified{background:#dcefe2;color:var(--green-dark);}
.badge.pendingv{background:#fff2dc;color:var(--amber);}

.dup-flag{background:#f3e0dc;color:var(--brick);font-size:10px;font-weight:800;padding:2px 7px;border-radius:9px;margin-left:6px;}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
@media (max-width:700px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12px;font-weight:700;color:var(--green-dark);}
.field label .req{color:var(--brick);}
.field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius);font-size:13.5px;font-family:inherit;background:#fff;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(45,95,62,.1);}
.field textarea{resize:vertical;min-height:62px;}
.hint{font-size:11.5px;color:#889;}
.field .err-msg{font-size:11px;color:var(--brick);}

.toast-wrap{position:fixed;top:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--green-dark);color:#fff;padding:13px 18px;border-radius:9px;font-size:13px;box-shadow:0 10px 26px rgba(0,0,0,.22);animation:slidein .22s ease;max-width:340px;display:flex;gap:10px;align-items:flex-start;}
.toast.err{background:var(--brick);}
.toast .ti{font-size:15px;flex:none;}
@keyframes slidein{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

.modal-overlay{position:fixed;inset:0;background:rgba(18,24,18,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:12px;max-width:620px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.modal.wide{max-width:780px;}
.modal .modal-head{padding:17px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2;}
.modal .modal-head h3{margin:0;font-size:16px;color:var(--green-dark);font-family:var(--serif);}
.modal .modal-body{padding:22px;}
.modal .modal-foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;position:sticky;bottom:0;background:#fff;}
.modal .close-x{background:none;border:none;font-size:19px;color:#aaa;line-height:1;}
.modal .close-x:hover{color:#555;}

/* stepper for staged processes */
.stepper{display:flex;margin-bottom:22px;}
.stepper .stp{flex:1;text-align:center;position:relative;font-size:11.5px;color:#99a;font-weight:700;}
.stepper .stp .dot{width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid var(--line);color:#99a;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:12px;position:relative;z-index:2;}
.stepper .stp::before{content:"";position:absolute;top:14px;left:-50%;width:100%;height:2px;background:var(--line);z-index:1;}
.stepper .stp:first-child::before{display:none;}
.stepper .stp.done .dot{background:var(--green);border-color:var(--green);color:#fff;}
.stepper .stp.done::before{background:var(--green);}
.stepper .stp.active .dot{background:var(--green-dark);border-color:var(--green-dark);color:#fff;box-shadow:0 0 0 4px rgba(45,95,62,.15);}
.stepper .stp.active{color:var(--green-dark);}

.timeline{list-style:none;margin:0;padding:0;}
.timeline li{position:relative;padding:0 0 18px 24px;border-left:2px solid var(--line);margin-left:5px;}
.timeline li:last-child{border-color:transparent;padding-bottom:0;}
.timeline li::before{content:"";position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid #fff;}
.timeline li.is-reject::before{background:var(--brick);}
.timeline .tl-title{font-weight:700;font-size:13px;color:var(--green-dark);}
.timeline .tl-meta{font-size:11.5px;color:#99a;margin-top:2px;}
.timeline .tl-note{font-size:12.5px;color:#566;margin-top:5px;background:var(--cream);padding:7px 10px;border-radius:7px;}

.meta-block{background:var(--cream);border-radius:9px;padding:13px 15px;margin:12px 0;font-size:12.5px;line-height:1.8;}
.meta-block .mb-title{font-weight:700;color:var(--green-dark);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px;}
.meta-grid div span{color:#889;}

.empty-state{padding:40px;text-align:center;color:#99a;font-size:13.5px;}
.empty-state .ei{font-size:32px;opacity:.4;display:block;margin-bottom:10px;}
.muted{color:#889;}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.tag-pill{font-size:11px;background:var(--cream);color:var(--green-dark);padding:2px 9px;border-radius:10px;font-weight:700;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line-soft);}
.toggle-row:last-child{border-bottom:none;}
.switch{position:relative;width:44px;height:24px;background:#ccc;border-radius:20px;cursor:pointer;transition:.15s;flex:none;}
.switch.on{background:var(--green);}
.switch .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}
.switch.on .knob{left:22px;}

.barcode-box{display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:8px;}
.barcode-bars{display:flex;gap:1px;height:54px;align-items:flex-end;}
.barcode-bars span{display:block;background:#161616;}
.cert{border:3px double var(--green-dark);border-radius:8px;padding:26px;text-align:center;background:linear-gradient(170deg,#fbfdf9,#f3f6ef);position:relative;}
.cert .seal{position:absolute;top:16px;right:16px;width:54px;height:54px;border-radius:50%;border:2px solid var(--amber);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;text-align:center;line-height:1.1;opacity:.8;}
.cert .cert-org{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--green-dark);font-weight:700;}
.cert .cert-title{font-family:var(--serif);color:var(--green-dark);font-size:18px;font-weight:700;margin:8px 0;}
.cert .cert-num{font-family:var(--serif);font-size:25px;letter-spacing:1.5px;margin:10px 0;color:var(--ink);}
.cert .cert-foot{font-size:11px;color:#889;margin-top:10px;}

.tabs-inline{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap;}
.tab-inline{padding:9px 16px;font-size:13px;font-weight:600;color:#778;cursor:pointer;border-bottom:2px solid transparent;}
.tab-inline.active{color:var(--green-dark);border-bottom-color:var(--green);}

.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 0;}
.bar-chart .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
.bar-chart .bar{width:100%;max-width:46px;background:linear-gradient(180deg,var(--green),var(--green-dark));border-radius:5px 5px 0 0;transition:.3s;min-height:3px;}
.bar-chart .bar.alt{background:linear-gradient(180deg,var(--teal),#155f61);}
.bar-chart .bar-lbl{font-size:10.5px;color:#778;font-weight:600;}
.bar-chart .bar-val{font-size:10.5px;color:var(--green-dark);font-weight:700;}
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
.legend .lg{display:flex;align-items:center;gap:8px;}
.legend .sw{width:13px;height:13px;border-radius:3px;flex:none;}

.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.perm-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 9px;border:1px solid var(--line-soft);border-radius:7px;}
.perm-item input{width:16px;height:16px;}

.cardgrid-pay{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
@media (max-width:520px){.cardgrid-pay{grid-template-columns:1fr;}}
.pay-method{display:flex;gap:10px;margin-bottom:16px;}
.pay-method .pm{flex:1;border:1.5px solid var(--line);border-radius:9px;padding:13px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:600;color:#667;}
.pay-method .pm.sel{border-color:var(--green);background:#f4f8f4;color:var(--green-dark);}
.pay-method .pm .pmi{font-size:19px;display:block;margin-bottom:5px;}

.link-pair{display:inline-flex;align-items:center;gap:5px;}
.link-pair .arr{color:#bbb;}

.info-line{display:flex;gap:8px;align-items:center;font-size:12.5px;color:#566;padding:6px 0;}
.info-line .il-k{color:#99a;min-width:140px;}
.divider{height:1px;background:var(--line-soft);margin:16px 0;}
.note-box{background:#f4f8f4;border-left:3px solid var(--green);padding:11px 14px;border-radius:0 7px 7px 0;font-size:12.5px;color:#445;line-height:1.55;margin:12px 0;}
.warn-box{background:#fdf3ec;border-left:3px solid var(--amber);padding:11px 14px;border-radius:0 7px 7px 0;font-size:12.5px;color:#6a4a1a;line-height:1.55;margin:12px 0;}
.print-area{font-size:13px;}
</style>

};

function uid(p){ return p+'-'+Math.random().toString(36).slice(2,7).toUpperCase(); }
function pad(n,l){ return String(n).padStart(l,'0'); }
function fmtDate(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d){ return fmtDate(d)+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d; }
function nowStr(){ return fmtDateTime(new Date()); }
function rs(n){ return 'Rs. '+Number(n).toLocaleString('en-LK',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ====================== STATE ====================== */

  publishers:[], registrations:[], staff:[], requests:[], payments:[],

function notify(pid, text, kind){ state.notifications.unshift({id:uid('NTF'), publisherId:pid, text, time:nowStr(), read:false, kind:kind||'info'}); }

    ['Sarasavi Publishers (Pvt) Ltd','info@sarasavi.lk','0112826878','PV 44102','No. 30, Ward Place, Colombo 07','955-30','Institutional',2002],

    ['Lake House Bookshop','lakehouse@anc.lk','0112421181','PV 00012','D.R. Wijewardene Mw, Colombo 10','955-9','Institutional',1995],

  let r8 = SEED_REQ({id:'REQ-2X4D2', type:'ISMN', pubId:'PUB-1001', title:'Hymns for Vesak — Choral Score', author:'W. Amaradeva (arr.)', age:12, language:'Sinhala'});
  advance(r8,[

function pubName(id){ const p=state.publishers.find(x=>x.id===id); return p?p.name:id; }
function computeFee(type){
  const base = state.fees[type];
  const taxes = state.fees.taxes.map(t=>({name:t.name, amount: Math.round(base*t.pct)/100, pct:t.pct}));
  const taxTotal = taxes.reduce((s,t)=>s+t.amount,0);
  return { base, taxes, total: base+taxTotal };
}
function payFor(r, method, statusAfter, age, verifier){
  const pay = {id:uid('PAY'), requestId:r.id, publisherId:r.publisherId, publisherName:r.publisherName,
    amount:r.fee, method, status: statusAfter==='verified'?'Verified':'Pending Verification',
    time:fmtDateTime(daysAgo(age)), verifiedBy: statusAfter==='verified'?(verifier||'Finance Officer'):null,
    receiptNo: statusAfter==='verified'?('RC-'+pad(Math.floor(Math.random()*9000+1000),4)):null};
  state.payments.push(pay);
  r.paymentStatus = statusAfter==='verified' ? 'verified' : 'submitted_payment';
  r.history.push({status:'approved', by:r.publisherName, time:fmtDateTime(daysAgo(age)), note:`${rs(r.fee)} paid via ${method}.`});
  if(statusAfter==='verified') r.history.push({status:'payment_verified', by:verifier||'Finance Officer', time:fmtDateTime(daysAgo(age)), note:`Payment verified. Receipt ${pay.receiptNo} generated.`});
  return pay;
}

function statusBadge(r){
  let key=r.status, label=STATUS_LABEL[key]||key;
  if(r.status==='approved'&&r.paymentStatus==='pending'){label='Awaiting Payment';key='payment_pending';}
  if(r.status==='approved'&&r.paymentStatus==='submitted_payment'){label='Payment in Review';key='under_review';}
  if(r.status==='approved'&&r.paymentStatus==='verified'){label='Ready to Issue';key='payment_verified';}

function barcode(num){
  const digits=(num||'').replace(/\D/g,'')||'9789550000000'; let bars='';
  for(let i=0;i<digits.length;i++){const w=(parseInt(digits[i])%3)+1.5;bars+=`<span style="width:${w}px;height:${28+parseInt(digits[i])*2.4}px"></span>`;}
  return `<div class="barcode-box"><div class="barcode-bars">${bars}</div><div class="mono" style="letter-spacing:2px;">${num||'—'}</div></div>`;
}

function runPublicSearch(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const type=document.getElementById('searchType').value;
  const box=document.getElementById('searchResults'); if(!q){box.innerHTML='';return;}
  let rows=[];
  if(type==='all'||type==='publisher') state.publishers.forEach(p=>{ if(p.name.toLowerCase().includes(q)||(p.regElement||'').toLowerCase().includes(q)) rows.push({l:p.name,t:'Publisher',m:p.accountType+' · since '+p.sinceYear});});
  if(type!=='publisher') state.requests.forEach(r=>{
    const hay=(r.title+' '+(r.book?.subject||'')+' '+(r.assignedNumber||'')+' '+(r.linked10||'')).toLowerCase();
    const match = type==='number' ? ((r.assignedNumber||'')+(r.linked10||'')).toLowerCase().includes(q)
      : type==='subject' ? (r.book?.subject||'').toLowerCase().includes(q)
      : type==='publication' ? r.title.toLowerCase().includes(q)
      : hay.includes(q);
    if(match) rows.push({l:r.title,t:r.type,m: r.assignedNumber?('Issued · '+r.assignedNumber):STATUS_LABEL[r.status]});
  });
  if(!rows.length){box.innerHTML=`<div class="search-results"><div class="row muted">No matching records found in the public directory.</div></div>`;return;}
  box.innerHTML=`<div class="search-results"><div class="rh">${rows.length} result${rows.length>1?'s':''}</div>${rows.slice(0,8).map(r=>`<div class="row"><span><b>${r.l}</b> &nbsp;<span class="muted">${r.m||''}</span></span><span class="tag">${r.t}</span></div>`).join('')}</div>`;
}

function findDuplicates(nic,email,mobile,name){
  const m=[]; const lc=s=>(s||'').toLowerCase();
  state.publishers.forEach(p=>{ if(lc(p.nic)===lc(nic)||lc(p.email)===lc(email)||lc(p.mobile)===lc(mobile)) m.push({t:'Existing Publisher',n:p.name,r:p.id});});
  state.registrations.forEach(r=>{ if(r.status!=='rejected'&&(lc(r.nic)===lc(nic)||lc(r.email)===lc(email)||lc(r.mobile)===lc(mobile))) m.push({t:'Pending Registration',n:r.name,r:r.id});});
  return m;
}
function submitSignup(force){
  const g=id=>(document.getElementById(id).value||'').trim();
  const name=g('su_name'),addr=g('su_addr'),nic=g('su_nic'),email=g('su_email'),mobile=g('su_mobile');
  if(!name||!addr||!nic||!email||!mobile){toast('Please complete all required fields.',true);return;}
  const dupes=findDuplicates(nic,email,mobile,name);
  if(dupes.length&&!force){
    openModal('Possible Duplicate Account',`<div class="warn-box">Our duplicate-account integrity check (ToR §11) found existing records matching this NIC, email or mobile:</div>
      <ul style="font-size:13px;line-height:1.7;">${dupes.map(d=>`<li><b>${d.n}</b> — ${d.t} (${d.r})</li>`).join('')}</ul>
      <p style="font-size:13px;color:#667;">If this is genuinely a separate applicant, continue and your registration will be flagged for staff to review and merge if needed.</p>`,
      `<button class="btn ghost small" onclick="closeModal()">Cancel</button><button class="btn small" onclick="closeModal();submitSignup(true)">Continue Anyway</button>`);
    return;
  }
  const reg={id:uid('REG'),name,address:addr,nic,email,mobile,accountType:g('su_type'),status:'pending_review',createdAt:nowStr(),duplicateFlag:dupes.length>0,
    history:[{status:'pending_review',by:name,time:nowStr(),note:dupes.length?'Registration submitted (flagged as possible duplicate).':'Registration submitted online.'}]};
  state.registrations.push(reg);
  addAudit(name,'Submitted account registration',`Registration ${reg.id} created.${dupes.length?' Flagged as possible duplicate.':''}`,'Registration');
  openModal('Registration Submitted',`<div class="note-box">Thank you, <b>${name}</b>. Your application reference is <b>${reg.id}</b>.</div>
    <p style="font-size:13.5px;line-height:1.6;">A Reviewing Officer will verify your details and an Approving Officer will activate your account. You'll be able to sign in once approved. You can track progress by contacting the NLDSB counter with your reference.</p>`,
    `<button class="btn small" onclick="closeModal();goPublic()">Return to Home</button>`);
}

function navCounts(role){
  const sub=state.requests.filter(r=>r.status==='submitted'||r.status==='under_review').length;

function commitReq(){

}

function finalizePayment(id, method, txn){

      <div class="field"><label>Registrant Element</label><input value="${p.regElement}" disabled></div>
      <div class="field full"><label>Address</label><input value="${p.address}" disabled></div>
      <div class="field"><label>Publisher Since</label><input value="${p.sinceYear}" disabled></div>

}
</script>
<script>
/* ========================================================================
   SHARED STAFF HELPERS
   ======================================================================== */
function reqRow(r, btn){
  return `<tr><td class="mono">${r.id}</td><td><span class="tag-pill">${r.type}</span></td><td><b>${r.title}</b><br><span class="muted" style="font-size:11.5px;">${r.publisherName}</span></td><td>${statusBadge(r)}</td><td class="muted">${r.createdAt}</td><td class="t-right">${btn}</td></tr>`;
}
function miniStepper(steps, activeIdx){
  return `<div class="stepper">${steps.map((s,i)=>`<div class="stp ${i<activeIdx?'done':''} ${i===activeIdx?'active':''}"><div class="dot">${i<activeIdx?'✓':i+1}</div>${s}</div>`).join('')}</div>`;
}

/* ========================================================================
   REVIEWING OFFICER
   ======================================================================== */
function reviewingView(tab){
  return ({dashboard:revDashboard,regqueue:revRegQueue,reqqueue:revReqQueue,m_account:revManualAccount,m_request:revManualRequest,m_payment:revManualPayment,legacy:revLegacy,publishers:revPublishers}[tab]||revDashboard)();
}
function revDashboard(){
  const regRev=state.registrations.filter(r=>r.status==='pending_review');
  const reqRev=state.requests.filter(r=>r.status==='submitted'||r.status==='under_review');
  const corr=state.requests.filter(r=>r.status==='correction');
  return pageHead('Reviewing Officer — Dashboard','Verify and correct incoming registrations and identifier requests before they go for approval.')+
  `<div class="stat-row">
    ${statCard(regRev.length,'Registrations to Review','👤')}
    ${statCard(reqRev.length,'Requests to Review','▤',true)}
    ${statCard(corr.length,'Awaiting Corrections','✎')}
    ${statCard(state.publishers.length,'Active Publishers','📖')}
  </div>
  <div class="quick-actions">
    <button class="btn" onclick="setTab('reqqueue')">Review Requests</button>
    <button class="btn outline" onclick="setTab('regqueue')">Review Registrations</button>
    <button class="btn outline" onclick="setTab('m_account')">Manual Entry</button>
  </div>
  <div class="panel"><div class="panel-head"><h3>Requests Awaiting Review</h3><span class="ph-sub">Oldest first</span></div><div class="panel-body flush">
    ${reqRev.length?`<table><thead><tr><th>Ref</th><th>Type</th><th>Publication</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
    ${reqRev.map(r=>reqRow(r,`<button class="btn small" onclick="openReview('${r.id}')">Review</button>`)).join('')}</tbody></table>`:emptyState('Queue is clear.','✓')}
  </div></div>`;
}
function revRegQueue(){
  const rows=state.registrations.filter(r=>r.status==='pending_review');
  return pageHead('Registration Review','Verify new publisher account applications. Confirm identity details, then forward for approval or request a correction.','Review › Registrations')+
  `<div class="panel"><div class="panel-body flush">
    ${rows.length?`<table><thead><tr><th>Ref</th><th>Applicant</th><th>Type</th><th>NIC / BR</th><th>Submitted</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td class="mono">${r.id}</td><td><b>${r.name}</b>${r.duplicateFlag?`<span class="dup-flag">DUPLICATE?</span>`:''}<br><span class="muted" style="font-size:11.5px;">${r.email}</span></td><td>${r.accountType}</td><td class="mono">${r.nic}</td><td class="muted">${r.createdAt}</td><td class="t-right"><button class="btn small" onclick="openRegReview('${r.id}')">Review</button></td></tr>`).join('')}</tbody></table>`:emptyState('No registrations awaiting review.','✓')}
  </div></div>`;
}
function openRegReview(id){
  const r=state.registrations.find(x=>x.id===id);
  const dupes=findDuplicates(r.nic,r.email,r.mobile,r.name).filter(d=>d.r!==r.id);
  openModal(`Review Registration — ${r.name}`,`
    ${miniStepper(['Submitted','Review','Approval','Active'],1)}
    ${r.duplicateFlag||dupes.length?`<div class="warn-box"><b>Integrity check:</b> possible duplicate of ${dupes.map(d=>d.n).join(', ')||'an existing record'}. Verify before forwarding.</div>`:`<div class="note-box">No duplicate matches found on NIC, email or mobile.</div>`}
    <div class="meta-block"><div class="mb-title">Applicant Details</div><div class="meta-grid">
      <div><span>Name:</span> ${r.name}</div><div><span>Type:</span> ${r.accountType}</div>
      <div><span>NIC/BR:</span> ${r.nic}</div><div><span>Mobile:</span> ${r.mobile}</div>
      <div><span>Email:</span> ${r.email}</div><div><span>Address:</span> ${r.address}</div>
    </div></div>
    <div class="field full"><label>Reviewer note</label><textarea id="reg_note" placeholder="Verification notes (visible in history)"></textarea></div>`,
    `<button class="btn ghost small" onclick="closeModal()">Cancel</button>
     <button class="btn ghost small" onclick="openRegEdit('${r.id}')">Edit Details</button>
     <button class="btn danger small" onclick="regRequestCorrection('${r.id}')">Request Correction</button>
     <button class="btn small" onclick="regForward('${r.id}')">Verify &amp; Forward for Approval</button>`,true);
}
function openRegEdit(id){
  const r=state.registrations.find(x=>x.id===id);
  openModal(`Edit Registration — ${r.name}`,`
    <div class="note-box">Modify the applicant's details on their behalf (e.g. correcting an obvious typo confirmed against their documents). The change is recorded in the registration history and audit trail.</div>
    <div class="form-grid">
      <div class="field full"><label>Publisher / Author Name</label><input id="er_name" value="${(r.name||'').replace(/"/g,'&quot;')}"></div>
      <div class="field full"><label>Address</label><input id="er_addr" value="${(r.address||'').replace(/"/g,'&quot;')}"></div>
      <div class="field"><label>Account Type</label><select id="er_type"><option ${r.accountType==='Author Publisher'?'selected':''}>Author Publisher</option><option ${r.accountType==='Institutional'?'selected':''}>Institutional</option></select></div>
      <div class="field"><label>NIC / Business Reg. / Passport</label><input id="er_nic" value="${(r.nic||'').replace(/"/g,'&quot;')}"></div>
      <div class="field"><label>Email</label><input id="er_email" value="${(r.email||'').replace(/"/g,'&quot;')}"></div>
      <div class="field"><label>Mobile</label><input id="er_mobile" value="${(r.mobile||'').replace(/"/g,'&quot;')}"></div>
    </div>`,
    `<button class="btn ghost small" onclick="openRegReview('${r.id}')">Back</button>
     <button class="btn small" onclick="saveRegEdit('${r.id}')">Save Changes</button>`,true);
}
function saveRegEdit(id){
  const r=state.registrations.find(x=>x.id===id);
  const before={name:r.name,address:r.address,accountType:r.accountType,nic:r.nic,email:r.email,mobile:r.mobile};
  r.name=gv('er_name')||r.name; r.address=gv('er_addr')||r.address; r.accountType=document.getElementById('er_type').value;
  r.nic=gv('er_nic')||r.nic; r.email=gv('er_email')||r.email; r.mobile=gv('er_mobile')||r.mobile;
  const changed=Object.keys(before).filter(k=>before[k]!==r[k]);
  // re-run duplicate check after edit
  const dupes=findDuplicates(r.nic,r.email,r.mobile,r.name).filter(d=>d.r!==r.id);
  r.duplicateFlag=dupes.length>0;
  r.history.push({status:r.status,by:'D.M. Wickramasinghe (Reviewing Officer)',time:nowStr(),note:changed.length?`Details modified by Reviewing Officer (${changed.join(', ')}).`:'Details reviewed; no changes made.'});
  addAudit('Reviewing Officer','Modified registration',`${r.id} edited: ${changed.join(', ')||'no change'}.`,'Registration');
  toast(changed.length?'Registration details updated.':'No changes made.');
  openRegReview(id);
}
function regForward(id){
  const r=state.registrations.find(x=>x.id===id); const note=gv('reg_note');
  r.status='forwarded'; r.history.push({status:'forwarded',by:'D.M. Wickramasinghe (Reviewing Officer)',time:nowStr(),note:note||'Details verified. Forwarded for approval.'});
  addAudit('Reviewing Officer','Forwarded registration',`${r.id} (${r.name}) forwarded for approval.`,'Registration');
  closeModal();render();toast(`${r.name} forwarded to the Approving Officer.`);
}
function regRequestCorrection(id){
  const r=state.registrations.find(x=>x.id===id); const note=gv('reg_note');
  if(!note){toast('Please add a note describing the correction needed.',true);return;}
  r.status='pending_review'; r.history.push({status:'correction',by:'D.M. Wickramasinghe (Reviewing Officer)',time:nowStr(),note});
  addAudit('Reviewing Officer','Requested correction',`Registration ${r.id}: ${note}`,'Registration');
  closeModal();render();toast('Correction requested — applicant will be contacted.');
}
function revReqQueue(){
  const rows=state.requests.filter(r=>r.status==='submitted'||r.status==='under_review'||r.status==='correction');
  return pageHead('Request Review','Review ISBN / ISMN / ISSN requests. Confirm the publication details, then forward for approval or request a correction.','Review › Requests')+
  `<div class="panel"><div class="panel-body flush">
    ${rows.length?`<table><thead><tr><th>Ref</th><th>Type</th><th>Publication</th><th>Publisher</th><th>Status</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td class="mono">${r.id}</td><td><span class="tag-pill">${r.type}</span></td><td><b>${r.title}</b></td><td class="muted">${r.publisherName}</td><td>${statusBadge(r)}</td><td class="t-right"><button class="btn small" onclick="openReview('${r.id}')">Review</button></td></tr>`).join('')}</tbody></table>`:emptyState('No requests awaiting review.','✓')}
  </div></div>`;
}
function openReview(id){
  const r=state.requests.find(x=>x.id===id);
  if(r.status==='submitted'){ r.status='under_review'; r.history.push({status:'under_review',by:'Reviewing Officer',time:nowStr(),note:'Picked up for review.'}); }
  openModal(`Review — ${r.title}`,`
    ${miniStepper(['Submitted','Review','Approval','Payment','Issued'],1)}
    <div class="meta-block"><div class="mb-title">Request</div><div class="meta-grid">
      <div><span>Type:</span> ${r.type}</div><div><span>Format:</span> ${r.format}</div>
      <div><span>${r.serial?'Issuing body':'Author'}:</span> ${r.author}</div><div><span>Language:</span> ${r.language}</div>
      <div><span>Publisher:</span> ${r.publisherName}</div><div><span>Fee:</span> ${rs(r.fee)}</div>
    </div></div>
    ${requestMetaBlock(r)}
    <div class="field full"><label>Reviewer note</label><textarea id="rev_note" placeholder="Notes recorded in the request history"></textarea></div>`,
    `<button class="btn ghost small" onclick="closeModal()">Cancel</button>
     <button class="btn ghost small" onclick="openReqEdit('${r.id}')">Edit Details</button>
     <button class="btn danger small" onclick="requestCorrection('${r.id}')">Request Correction</button>
     <button class="btn small" onclick="forwardForApproval('${r.id}')">Forward for Approval</button>`,true);
  render();
}
function openReqEdit(id){
  const r=state.requests.find(x=>x.id===id);
  const esc=v=>(v||'').replace(/"/g,'&quot;');
  const bookFields = r.serial ? '' : `
    <div class="field"><label>Edition</label><input id="eq_edition" value="${esc(r.book?.edition)}"></div>
    <div class="field"><label>No. of Pages</label><input id="eq_pages" value="${esc(r.book?.pages)}"></div>
    <div class="field"><label>Price (Rs.)</label><input id="eq_price" value="${esc(r.book?.price)}"></div>
    <div class="field"><label>Subject Area</label><input id="eq_subject" value="${esc(r.book?.subject)}"></div>
    <div class="field"><label>Year of Publication</label><input id="eq_year" value="${esc(r.book?.year)}"></div>`;
  const serialFields = r.serial ? `
    <div class="field"><label>Start Date</label><input id="eq_startdate" value="${esc(r.serial.startDate)}"></div>
    <div class="field"><label>Volume / No.</label><input id="eq_volno" value="${esc(r.serial.volNo)}"></div>
    <div class="field"><label>Physical Medium</label><input id="eq_medium" value="${esc(r.serial.medium)}"></div>
    <div class="field"><label>Type of Serial</label><input id="eq_serialtype" value="${esc(r.serial.serialType)}"></div>
    <div class="field"><label>Frequency</label><input id="eq_freq" value="${esc(r.serial.frequency)}"></div>
    <div class="field"><label>Key-title Alphabet</label><input id="eq_alphabet" value="${esc(r.serial.alphabet)}"></div>
    <div class="field full"><label>Editorial Information</label><input id="eq_editorial" value="${esc(r.serial.editorial)}"></div>` : '';
  openModal(`Edit Request — ${r.title}`,`
    <div class="note-box">Correct the publication details on the publisher's behalf (e.g. a spelling or classification fix). The change is recorded in the request history and audit trail.</div>
    <div class="form-grid">
      <div class="field full"><label>Title of Publication</label><input id="eq_title" value="${esc(r.title)}"></div>
      <div class="field"><label>${r.serial?'Issuing Body':'Author / Composer / Editor'}</label><input id="eq_author" value="${esc(r.author)}"></div>
      <div class="field"><label>Format</label><input id="eq_format" value="${esc(r.format)}"></div>
      <div class="field"><label>Language</label><select id="eq_lang"><option ${r.language==='Sinhala'?'selected':''}>Sinhala</option><option ${r.language==='Tamil'?'selected':''}>Tamil</option><option ${r.language==='English'?'selected':''}>English</option></select></div>
      ${bookFields}${serialFields}
    </div>`,
    `<button class="btn ghost small" onclick="openReview('${r.id}')">Back</button>
     <button class="btn small" onclick="saveReqEdit('${r.id}')">Save Changes</button>`,true);
}
function saveReqEdit(id){
  const r=state.requests.find(x=>x.id===id);
  const changed=[];
  const set=(k,v)=>{ if(v!==undefined && r[k]!==v){changed.push(k); r[k]=v;} };
  set('title',gv('eq_title')||r.title); set('author',gv('eq_author')||r.author); set('format',gv('eq_format')||r.format); set('language',document.getElementById('eq_lang').value);
  if(r.serial){
    r.serial={startDate:gv('eq_startdate'),volNo:gv('eq_volno'),medium:gv('eq_medium'),serialType:gv('eq_serialtype'),frequency:gv('eq_freq'),alphabet:gv('eq_alphabet'),editorial:gv('eq_editorial')};
    changed.push('serial details');
  } else {
    r.book={edition:gv('eq_edition'),pages:gv('eq_pages'),price:gv('eq_price'),subject:gv('eq_subject'),year:gv('eq_year')};
    changed.push('publication details');
  }
  r.history.push({status:r.status,by:'Reviewing Officer',time:nowStr(),note:`Details modified by Reviewing Officer (${changed.join(', ')}).`});
  addAudit('Reviewing Officer','Modified request',`${r.id} edited: ${changed.join(', ')}.`,'Request');
  notify(r.publisherId,`Your ${r.type} request "${r.title}" was edited by a Reviewing Officer during review.`);
  toast('Request details updated.');
  openReview(id);
}
function forwardForApproval(id){
  const r=state.requests.find(x=>x.id===id); const note=gv('rev_note');
  r.status='forwarded'; r.history.push({status:'forwarded',by:'Reviewing Officer',time:nowStr(),note:note||'Reviewed and verified. Forwarded for approval.'});
  notify(r.publisherId,`Your ${r.type} request "${r.title}" has passed review and is awaiting approval.`);
  addAudit('Reviewing Officer','Forwarded request',`${r.id} forwarded for approval.`,'Request');
  closeModal();render();toast(`${r.id} forwarded to the Approving Officer.`);
}
function requestCorrection(id){
  const r=state.requests.find(x=>x.id===id); const note=gv('rev_note');
  if(!note){toast('Please describe the correction needed.',true);return;}
  r.status='correction'; r.history.push({status:'correction',by:'Reviewing Officer',time:nowStr(),note});
  notify(r.publisherId,`A correction was requested for "${r.title}": ${note}`);
  addAudit('Reviewing Officer','Requested correction',`${r.id}: ${note}`,'Request');
  closeModal();render();toast('Correction requested — publisher notified.');
}

/* ---- Manual entry (counter / paper applications) ---- */
function revManualAccount(){
  return pageHead('Manual Entry — Create Publisher Account','For walk-in or postal applicants. The account is created directly in Active state and recorded as a counter registration.','Manual Entry › Create Account')+
  `<div class="panel"><div class="panel-head"><h3>New Publisher (counter)</h3><span class="ph-sub">All fields support duplicate detection</span></div><div class="panel-body">
    <div class="form-grid">
      <div class="field full"><label>Publisher / Author Name <span class="req">*</span></label><input id="ma_name"></div>
      <div class="field full"><label>Address <span class="req">*</span></label><input id="ma_addr"></div>
      <div class="field"><label>NIC / Business Reg. / Passport <span class="req">*</span></label><input id="ma_nic"></div>
      <div class="field"><label>Account Type</label><select id="ma_type"><option>Author Publisher</option><option>Institutional</option></select></div>
      <div class="field"><label>Email <span class="req">*</span></label><input id="ma_email"></div>
      <div class="field"><label>Mobile <span class="req">*</span></label><input id="ma_mobile"></div>
    </div>
    <div class="note-box">Counter staff confirm the applicant's original documents before creating the account. The action is logged in the audit trail.</div>
    <button class="btn" onclick="manualCreateAccount()">Create Active Account</button>
  </div></div>`;
}
function manualCreateAccount(){
  const g=id=>(document.getElementById(id).value||'').trim();
  const name=g('ma_name'),addr=g('ma_addr'),nic=g('ma_nic'),email=g('ma_email'),mobile=g('ma_mobile');
  if(!name||!addr||!nic||!email||!mobile){toast('Please complete all required fields.',true);return;}
  const dupes=findDuplicates(nic,email,mobile,name);
  if(dupes.length){ openModal('Possible Duplicate',`<div class="warn-box">Matches found: ${dupes.map(d=>d.n).join(', ')}. Create anyway only if this is genuinely separate.</div>`,`<button class="btn ghost small" onclick="closeModal()">Cancel</button><button class="btn small" onclick="closeModal();doManualCreate('${encodeURIComponent(name)}','${encodeURIComponent(addr)}','${nic}','${email}','${mobile}')">Create Anyway</button>`); return; }
  doManualCreate(encodeURIComponent(name),encodeURIComponent(addr),nic,email,mobile);
}
function doManualCreate(nE,aE,nic,email,mobile){
  const name=decodeURIComponent(nE);
  const id='PUB-'+(1001+state.publishers.length);
  state.publishers.push({id,name,address:decodeURIComponent(aE),nic,email,mobile,regElement:'Common Registrant',accountType:document.getElementById('ma_type')?document.getElementById('ma_type').value:'Author Publisher',sinceYear:new Date().getFullYear(),accountStatus:'Active',createdAt:nowStr()});
  addAudit('Reviewing Officer','Created account (manual)',`${name} created at counter as ${id}.`,'Registration');
  toast(`Account ${id} created for ${name}.`); render();
}
function revManualRequest(){
  const opts=state.publishers.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  return pageHead('Manual Entry — Submit Request','Submit an ISBN / ISMN / ISSN request on behalf of a publisher (postal or counter application).','Manual Entry › Submit Request')+
  `<div class="panel"><div class="panel-body">
    <div class="form-grid">
      <div class="field full"><label>On behalf of Publisher <span class="req">*</span></label><select id="mr_pub">${opts}</select></div>
      <div class="field"><label>Identifier Type</label><select id="mr_type"><option>ISBN</option><option>ISMN</option><option>ISSN</option></select></div>
      <div class="field"><label>Format</label><select id="mr_format"><option>Print</option><option>Digital</option></select></div>
      <div class="field full"><label>Title <span class="req">*</span></label><input id="mr_title"></div>
      <div class="field full"><label>Author / Issuing Body <span class="req">*</span></label><input id="mr_author"></div>
    </div>
    <div class="note-box">The request enters the same workflow as an online submission, starting at <b>Under Review</b> (already with an officer).</div>
    <button class="btn" onclick="manualSubmitRequest()">Submit Request</button>
  </div></div>`;
}
function manualSubmitRequest(){
  const pid=document.getElementById('mr_pub').value, type=document.getElementById('mr_type').value;
  const title=(document.getElementById('mr_title').value||'').trim(), author=(document.getElementById('mr_author').value||'').trim();
  if(!title||!author){toast('Please complete title and author.',true);return;}
  const fb=computeFee(type);
  const r={id:uid('REQ'),type,title,author,publisherId:pid,publisherName:pubName(pid),format:document.getElementById('mr_format').value,language:'Sinhala',createdAt:nowStr(),status:'under_review',paymentStatus:'pending',assignedNumber:null,linked10:null,fee:fb.total,feeBreak:fb,serial:null,book:type!=='ISSN'?{edition:'',pages:'',price:'',subject:''}:null,
    history:[{status:'submitted',by:'Reviewing Officer (manual)',time:nowStr(),note:`Submitted on behalf of ${pubName(pid)} (counter/postal).`},{status:'under_review',by:'Reviewing Officer',time:nowStr(),note:'Under review.'}]};
  state.requests.push(r);
  addAudit('Reviewing Officer','Submitted request (manual)',`${r.id} for ${pubName(pid)}.`,'Request');
  toast(`Request ${r.id} created for ${pubName(pid)}.`); render();
}
function revManualPayment(){
  const approved=state.requests.filter(r=>r.status==='approved'&&r.paymentStatus==='pending');
  const opts=approved.map(r=>`<option value="${r.id}">${r.id} — ${r.title} (${rs(r.fee)})</option>`).join('');
  return pageHead('Manual Entry — Record Offline Payment','Record a cash, cheque or bank-deposit payment made at the counter. It is then verified by Finance.','Manual Entry › Record Payment')+
  `<div class="panel"><div class="panel-body">
    ${approved.length?`<div class="form-grid">
      <div class="field full"><label>Approved Request <span class="req">*</span></label><select id="mp_req">${opts}</select></div>
      <div class="field"><label>Method</label><select id="mp_method"><option>Cash (Counter)</option><option>Cheque (Offline)</option><option>Bank Deposit (Offline)</option></select></div>
      <div class="field"><label>Slip / Cheque Reference</label><input id="mp_ref" placeholder="Reference no."></div>
    </div>
    <div class="note-box">Cheques payable to “Chairman, NLDSB”. Bank deposits to People's Bank Town Hall, A/C 167-1-001-6-3170315.</div>
    <button class="btn" onclick="manualRecordPayment()">Record Payment</button>`:emptyState('No approved requests are currently awaiting payment.','✓')}
  </div></div>`;
}
function manualRecordPayment(){
  const id=document.getElementById('mp_req').value; const r=state.requests.find(x=>x.id===id);
  const method=document.getElementById('mp_method').value;
  state.payments.push({id:uid('PAY'),requestId:r.id,publisherId:r.publisherId,publisherName:r.publisherName,amount:r.fee,method,status:'Pending Verification',time:nowStr(),verifiedBy:null,receiptNo:null,ref:(document.getElementById('mp_ref').value||'').trim()});
  r.paymentStatus='submitted_payment'; r.history.push({status:'approved',by:'Reviewing Officer (manual)',time:nowStr(),note:`Offline ${method} recorded (${rs(r.fee)}) — awaiting verification.`});
  addAudit('Reviewing Officer','Recorded offline payment',`${rs(r.fee)} for ${r.id} via ${method}.`,'Payment');
  toast('Offline payment recorded — now awaiting Finance verification.'); render();
}
function revLegacy(){
  return pageHead('Legacy Records','Add pre-2007 paper-based publisher prefixes and 10-digit ISBN / ISMN / ISSN records, linking to a 13-digit equivalent where one exists.','Manual Entry › Legacy Records')+
  `<div class="panel"><div class="panel-head"><h3>Bulk Upload (Excel / CSV)</h3><span class="ph-sub">Import many legacy records at once</span></div><div class="panel-body">

function downloadLegacyTemplate(){
  const csv='Publisher,Type,Number,Title,Year,Linked13\n"Sarasavi Publishers (Pvt) Ltd","ISBN (10-digit)","955-30-1234-5","Example Title","2002","978-955-30-1234-9"\n';
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='legacy-records-template.csv'; a.click(); URL.revokeObjectURL(url);
  toast('Template downloaded.');
}
function parseCSV(text){
  const rows=[]; let i=0,field='',row=[],inQ=false;
  while(i<text.length){const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=c; }
    else { if(c==='"')inQ=true; else if(c===','){row.push(field);field='';} else if(c==='\n'||c==='\r'){ if(field!==''||row.length){row.push(field);rows.push(row);row=[];field='';} if(c==='\r'&&text[i+1]==='\n')i++; } else field+=c; }
    i++;
  }
  if(field!==''||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}
function rowsToRecords(rows){
  if(!rows.length) return [];
  let start=0;
  const header=rows[0].map(h=>String(h).toLowerCase().trim());
  const hasHeader=header.includes('publisher')||header.includes('number');
  const idx={pub:0,type:1,num:2,title:3,year:4,linked:5};
  if(hasHeader){ start=1;
    header.forEach((h,i)=>{ if(h.startsWith('pub'))idx.pub=i; else if(h.startsWith('type'))idx.type=i; else if(h.startsWith('num'))idx.num=i; else if(h.startsWith('title'))idx.title=i; else if(h.startsWith('year'))idx.year=i; else if(h.includes('link'))idx.linked=i; });
  }
  const recs=[];
  for(let r=start;r<rows.length;r++){const c=rows[r];
    const num=String(c[idx.num]||'').trim(); if(!num) continue;
    recs.push({pub:String(c[idx.pub]||'').trim()||'(unknown)',type:String(c[idx.type]||'').trim()||'ISBN (10-digit)',num,title:String(c[idx.title]||'').trim()||'(untitled)',year:String(c[idx.year]||'').trim()||'—',linked:String(c[idx.linked]||'').trim()||null});
  }
  return recs;
}
function handleBulkFile(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  const name=file.name.toLowerCase();
  if(name.endsWith('.csv')){
    const reader=new FileReader();
    reader.onload=ev=>showBulkPreview(rowsToRecords(parseCSV(ev.target.result)));
    reader.readAsText(file);
  } else if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    loadSheetJS(()=>{
      const reader=new FileReader();
      reader.onload=ev=>{ try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        showBulkPreview(rowsToRecords(rows));
      }catch(err){ document.getElementById('bulk_preview').innerHTML=`<div class="warn-box">Could not read that Excel file. Please try a .csv export instead.</div>`; } };
      reader.readAsArrayBuffer(file);
    }, ()=>{ document.getElementById('bulk_preview').innerHTML=`<div class="warn-box">Excel parsing needs an internet connection to load the spreadsheet reader. If you're offline, please export your file as <b>.csv</b> and upload that — CSV works fully offline.</div>`; });
  } else {
    document.getElementById('bulk_preview').innerHTML=`<div class="warn-box">Unsupported file type. Please upload a .csv or .xlsx file.</div>`;
  }
}
function loadSheetJS(onOk,onFail){
  if(window.XLSX){ onOk(); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=()=>onOk(); s.onerror=()=>onFail&&onFail();
  document.head.appendChild(s);
}
function showBulkPreview(recs){
  state.bulkStaged=recs;

  if(!recs.length){ pv.innerHTML=`<div class="warn-box">No valid rows found. Ensure the file has a Number column.</div>`; return; }
  pv.innerHTML=`<div class="note-box">Parsed <b>${recs.length}</b> record${recs.length>1?'s':''} — review below, then import.</div>

function finalizeVerify(payId, verifier, isOverride, overrideNote){
  const p=state.payments.find(x=>x.id===payId); const r=state.requests.find(x=>x.id===p.requestId);
  p.status='Verified'; p.verifiedBy=verifier; p.receiptNo='RC-'+pad(Math.floor(Math.random()*9000+1000),4); p.override=isOverride;
  if(r){ r.paymentStatus='verified'; r.history.push({status:'payment_verified',by:verifier,time:nowStr(),note:isOverride?`Payment OVERRIDDEN. ${overrideNote} Receipt ${p.receiptNo}.`:`Payment verified. Receipt ${p.receiptNo} generated.`});
    notify(r.publisherId,`Your payment for "${r.title}" is verified. The number will be issued shortly.`); }
  addAudit(verifier.split('(')[0].trim(), isOverride?'Overrode payment':'Verified payment',`${p.id} (${rs(p.amount)})${isOverride?' — '+overrideNote:''}.`,'Payment');
  closeModal();render();toast(isOverride?'Payment overridden and recorded.':'Payment verified — receipt generated.');
}
function barChart(data, alt){
  const max=Math.max(...data.map(d=>d.v),1);
  return `<div class="bar-chart">${data.map(d=>`<div class="bar-col"><div class="bar-val">${d.v}</div><div class="bar ${alt?'alt':''}" style="height:${Math.round(d.v/max*140)}px"></div><div class="bar-lbl">${d.l}</div></div>`).join('')}</div>`;
}
function reportData(){
  const issued=state.requests.filter(r=>r.status==='issued');
  const verifiedPays=state.payments.filter(p=>p.status==='Verified');
  const revenue=verifiedPays.reduce((s,p)=>s+p.amount,0);
  const taxPortion=verifiedPays.reduce((s,p)=>s+state.fees.taxes.reduce((a,t)=>a+(p.amount-p.amount/(1+t.pct/100)),0),0);
  return {issued,verifiedPays,revenue,taxPortion};
}

function revenueByTypeDonut(){
  const d=reportData(); const byType={ISBN:0,ISMN:0,ISSN:0};
  d.verifiedPays.forEach(p=>{const r=state.requests.find(x=>x.id===p.requestId); if(r)byType[r.type]+=p.amount;});

  const colors={ISBN:'#2D5F3E',ISMN:'#1f8a8c',ISSN:'#a97a1f'};
  let acc=0; const segs=Object.entries(byType).map(([k,v])=>{const start=acc/tot*360;acc+=v;const end=acc/tot*360;return `${colors[k]} ${start}deg ${end}deg`;}).join(',');
  return `<div class="donut-wrap"><div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${segs});"></div>
    <div class="legend">${Object.entries(byType).map(([k,v])=>`<div class="lg"><span class="sw" style="background:${colors[k]}"></span>${k} — ${rs(v)}</div>`).join('')}</div></div>`;

function openIssueWizard(id){
  const r=state.requests.find(x=>x.id===id); state.wizard={id,step:1,format:'13'};
  renderIssueWizard();
}
function renderIssueWizard(){
  const w=state.wizard; const r=state.requests.find(x=>x.id===w.id);
  const reg=state.registers[r.type]; const p=state.publishers.find(x=>x.id===r.publisherId);
  const isIssn = r.type==='ISSN';
  // ISSN draws from ISSN International Centre blocks; ISBN/ISMN from registrant elements
  let sourceList = isIssn ? reg.blocks : reg.registrants;
  if(!w.chosen){
    if(isIssn){ w.chosen = sourceList.find(b=>b.capacity-b.used>0)?.el || sourceList[0].el; }
    else { const own=reg.registrants.find(x=>x.publisher===p?.name); w.chosen=own?own.el:(reg.registrants.find(x=>x.publisher.includes('Common'))?.el||sourceList[0].el); }
  }
  // one-ISSN-per-publication guard
  const already = isIssn && state.requests.find(x=>x.id!==r.id && x.type==='ISSN' && x.status==='issued' && x.title.toLowerCase()===r.title.toLowerCase() && (x.serial?.medium||'')===(r.serial?.medium||''));
  let body='';
  if(w.step===1){
    body=`${miniStepper(['Select Source','Generate Number','Confirm & Issue'],0)}
      ${isIssn
        ? `<div class="note-box"><b>ISSN policy:</b> numbers are assigned only from blocks officially provided by the <b>ISSN International Centre</b>, and <b>one ISSN is issued per publication</b> (per title and medium). The received / issued / available register is updated on issue.</div>
           ${already?`<div class="warn-box"><b>Duplicate publication:</b> an ISSN (${already.assignedNumber}) already exists for "${r.title}" in this medium. A separate ISSN should only be issued for a genuinely distinct serial or medium.</div>`:''}
           <div class="field full"><label>ISSN block (from ISSN International Centre)</label><select id="iw_reg" onchange="state.wizard.chosen=this.value">
             ${sourceList.map(b=>`<option value="${b.el}" ${w.chosen===b.el?'selected':''}>${b.el} — range ${b.range} (${b.capacity-b.used} of ${b.capacity} available)</option>`).join('')}
           </select></div>
           <div class="meta-block"><div class="mb-title">Publication (single ISSN)</div><div class="meta-grid">
             <div><span>Title:</span> ${r.title}</div><div><span>Medium:</span> ${r.serial?.medium||'—'}</div>
             <div><span>Type:</span> ${r.serial?.serialType||'—'}</div><div><span>Frequency:</span> ${r.serial?.frequency||'—'}</div>
           </div></div>`
        : `<div class="note-box">ISBN/ISMN numbers are <b>assigned from registrant elements</b> officially provided by the International ISBN/ISMN Agency — never generated arbitrarily (ToR §8). Choose the registrant element this identifier is drawn from.</div>
           <div class="field full"><label>Registrant element</label><select id="iw_reg" onchange="state.wizard.chosen=this.value">
             ${sourceList.map(x=>`<option value="${x.el}" ${w.chosen===x.el?'selected':''}>${x.el} — ${x.publisher} (${x.capacity-x.used} of ${x.capacity} available)</option>`).join('')}
           </select></div>
           <div class="field full"><label>Format</label><select id="iw_fmt" onchange="state.wizard.format=this.value">
             <option value="13" ${w.format==='13'?'selected':''}>13-digit (post-2007, standard)</option>
             <option value="10" ${w.format==='10'?'selected':''}>10-digit (legacy — link to a 13-digit)</option></select></div>`}`;
  } else if(w.step===2){
    const chosen=sourceList.find(x=>x.el===w.chosen)||sourceList[0];
    w.generated = w.generated || genNumber(r.type, chosen, w.format);
    body=`${miniStepper(['Select Source','Generate Number','Confirm & Issue'],1)}
      <div class="cert"><div class="cert-org">Proposed ${r.type}</div><div class="cert-num">${w.generated}</div>
      <div class="cert-foot">${isIssn?`Assigned from ISSN block ${chosen.el} · ISSN International Centre`:`Drawn from registrant ${chosen.el} · ${chosen.publisher}`}</div></div>
      ${(!isIssn&&w.format==='10')?`<div class="field full" style="margin-top:14px;"><label>Linked 13-digit number</label><input id="iw_link" placeholder="978-..." value="${w.link||''}"></div>`:''}
      <div class="note-box">Confirming will mark one number as <b>issued</b> in the ${r.type} register, decreasing availability by one.</div>`;
  } else {
    body=`${miniStepper(['Select Source','Generate Number','Confirm & Issue'],2)}
      <div style="text-align:center;padding:10px 0;"><div style="font-size:40px;">✓</div><h3 style="color:var(--green-dark);margin:6px 0;">${w.generated} issued</h3>
      <p class="muted">Certificate and barcode generated; record added to the directory and the register updated.</p></div>${barcode(w.generated)}`;
  }
  const foot = w.step===1?`<button class="btn ghost small" onclick="closeModal()">Cancel</button><button class="btn small" onclick="issueStep(2)">Next: Generate →</button>`
    : w.step===2?`<button class="btn ghost small" onclick="issueStep(1)">Back</button><button class="btn small" onclick="finalizeIssue()">Confirm &amp; Issue</button>`
    : `<button class="btn small" onclick="closeModal()">Done</button>`;
  openModal(`Issue Number — ${r.title}`, body, foot, true);
}
function genNumber(type, src, fmt){
  const seq=pad((src.used||0)+1,4);
  if(type==='ISSN'){const stem=(src.el||'').split('-')[0]; const a=stem&&/^\d/.test(stem)?stem:pad(Math.floor(Math.random()*9000+1000),4); const b=pad(Math.floor(Math.random()*9000+1000),4); return `${a}-${b}`;}
  if(type==='ISMN'){return `${src.el}-${seq}-7`;}
  if(fmt==='10'){return `${src.el}-${seq}-X`;}
  return `978-${src.el}-${seq}-${Math.floor(Math.random()*9)}`;
}
function issueStep(s){ const w=state.wizard; if(s===2){const rEl=document.getElementById('iw_reg'); if(rEl)w.chosen=rEl.value; const f=document.getElementById('iw_fmt'); if(f)w.format=f.value; w.generated=null;} w.step=s; renderIssueWizard(); }
function finalizeIssue(){
  const w=state.wizard; const r=state.requests.find(x=>x.id===w.id); const reg=state.registers[r.type];
  const isIssn = r.type==='ISSN';
  if(!isIssn && w.format==='10'){const l=document.getElementById('iw_link'); if(l)w.link=l.value.trim();}
  const src = isIssn ? reg.blocks.find(x=>x.el===w.chosen) : reg.registrants.find(x=>x.el===w.chosen);
  if(src) src.used+=1;
  reg.issued+=1; reg.available=Math.max(0,reg.available-1);
  r.status='issued'; r.assignedNumber=w.generated;
  if(!isIssn && w.format==='10'&&w.link){ r.linked10=r.assignedNumber; r.assignedNumber=w.link; }
  r.history.push({status:'issued',by:'N.S. Kodikara (Administrator)',time:nowStr(),note:isIssn?`ISSN ${r.assignedNumber} assigned from block ${w.chosen} (ISSN International Centre). Register updated.`:`Number ${r.assignedNumber} issued from registrant ${w.chosen}. Certificate &amp; barcode generated.`});
  notify(r.publisherId,`Your ${r.type} number ${r.assignedNumber} for "${r.title}" has been issued. Download your certificate from Issued Numbers.`);
  addAudit('Administrator','Issued number',`${r.assignedNumber} for ${r.id} from ${w.chosen}.`,'Issuance');
  w.step=3; renderIssueWizard(); render();
}

    <tr><td class="muted">${fmtDateTime(daysAgo(2))}</td><td>Automatic</td><td class="mono">47.9 MB</td><td><span class="badge verified">Complete</span></td></tr>
    <tr><td class="muted">${fmtDateTime(daysAgo(3))}</td><td>Manual</td><td class="mono">47.6 MB</td><td><span class="badge verified">Complete</span></td></tr>
  </tbody></table></div></div>`;
}
function runBackup(){state.lastBackup=nowStr();addAudit('System Administrator','Ran backup','Manual database backup completed.','System');secEvent('Backup','Manual backup completed successfully.');render();toast('Backup completed.');}

render();
</script>
